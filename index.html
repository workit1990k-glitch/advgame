<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step-Based Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #eee;
    }

    #game-container {
      position: relative;
      overflow: hidden;
      border: 2px solid #555;
      background: #2a2a2a;
    }

    #background {
      position: absolute;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      z-index: 1;
    }

    #player {
      position: absolute;
      width: var(--tile);
      height: var(--tile);
      background: #e74c3c; /* Replace with player PNG */
      border-radius: 50%;
      z-index: 10;
      transition: left 0.1s linear, top 0.1s linear;
      box-shadow: 0 0 8px rgba(231, 76, 60, 0.6);
    }

    #npc-display {
      position: absolute;
      width: var(--tile);
      height: var(--tile);
      object-fit: contain;
      z-index: 5;
      pointer-events: none;
      display: none;
    }

    #dialog-box {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid #777;
      border-radius: 4px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.4;
      z-index: 20;
      display: none;
    }

    #hint {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      padding: 6px 10px;
      border-radius: 3px;
      font-size: 12px;
      z-index: 30;
    }
  </style>
</head>
<body>

  <div id="game-container">
    <div id="background"></div>
    <div id="player"></div>
    <img id="npc-display" alt="NPC">
    <div id="dialog-box"></div>
    <div id="hint">↑ ↓ ← → to move</div>
  </div>

  <script>
    // 🗺️ MAP DATA (Everything in one place)
    const map = {
      width: 4,
      height: 3,
      tileSize: 64,
      background: "https://placehold.co/256x192/3d6b4f/ffffff?text=Village+BG", // Replace with your PNG path
      grid: [
        [1, 1, 1, 1],
        [1, 3, 1, 1],
        [1, 1, 2, 1]
      ],
      npcs: {
        2: {
          name: "Guard",
          sprite: "https://placehold.co/64x64/ffaa00/000?text=G", // Replace with guard.png
          dialog: "🛡️ Halt! Identify yourself."
        },
        3: {
          name: "Merchant",
          sprite: "https://placehold.co/64x64/00aaff/fff?text=M", // Replace with merchant.png
          dialog: "📦 Welcome! I have potions and swords."
        }
      }
    };

    // 🎮 GAME STATE
    let player = { x: 0, y: 0 };
    const tileSize = map.tileSize;

    // 📦 DOM ELEMENTS
    const container = document.getElementById("game-container");
    const bgEl = document.getElementById("background");
    const playerEl = document.getElementById("player");
    const npcImg = document.getElementById("npc-display");
    const dialogBox = document.getElementById("dialog-box");

    // ⚙️ INIT
    function init() {
      // Apply CSS variable for tile size
      document.documentElement.style.setProperty("--tile", `${tileSize}px`);
      
      // Size container to match map
      container.style.width = `${map.width * tileSize}px`;
      container.style.height = `${map.height * tileSize}px`;
      
      // Set background
      bgEl.style.backgroundImage = `url('${map.background}')`;
      
      // Position player at spawn
      updatePlayerPosition();
      
      // Bind input
      window.addEventListener("keydown", handleInput);
    }

    function updatePlayerPosition() {
      playerEl.style.left = `${player.x * tileSize}px`;
      playerEl.style.top = `${player.y * tileSize}px`;
    }

    function handleInput(e) {
      let dx = 0, dy = 0;
      switch (e.key) {
        case "ArrowUp":    dy = -1; break;
        case "ArrowDown":  dy = 1;  break;
        case "ArrowLeft":  dx = -1; break;
        case "ArrowRight": dx = 1;  break;
        default: return; // Ignore other keys
      }
      e.preventDefault(); // Stop page scrolling
      movePlayer(dx, dy);
    }

    function movePlayer(dx, dy) {
      const nx = player.x + dx;
      const ny = player.y + dy;

      // 1. Bounds check
      if (nx < 0 || nx >= map.width || ny < 0 || ny >= map.height) return;

      // 2. Optional: Wall check (if you add 0 = wall later)
      // if (map.grid[ny][nx] === 0) return;

      // 3. Apply movement
      player.x = nx;
      player.y = ny;
      updatePlayerPosition();

      // 4. Check what's under the player
      checkTileInteraction();
    }

    function checkTileInteraction() {
      const tileId = map.grid[player.y][player.x];
      const npc = map.npcs[tileId];

      if (npc) {
        // Show NPC sprite on the tile
        npcImg.src = npc.sprite;
        npcImg.style.display = "block";
        npcImg.style.left = `${player.x * tileSize}px`;
        npcImg.style.top = `${player.y * tileSize}px`;

        // Show dialog
        dialogBox.textContent = npc.dialog;
        dialogBox.style.display = "block";
      } else {
        // Hide when stepping off an NPC
        npcImg.style.display = "none";
        dialogBox.style.display = "none";
      }
    }

    // 🚀 START GAME
    init();
  </script>
</body>
</html>
